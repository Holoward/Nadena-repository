upstream nadena_backend {
    server 127.0.0.1:5034;
    keepalive 32;
}

server {
    listen 80;
    server_name nadena.com www.nadena.com;

    # Certbot will add SSL configuration here
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS (enable after SSL is set up)
    # return 301 https://$host$request_uri;

    # Temporary: serve without SSL until certbot runs
    location / {
        proxy_pass http://nadena_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

